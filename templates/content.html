{% extends "base.html" %}
{% block title %}콘텐츠{% endblock %}
{% block content %}
<h1>콘텐츠 생성</h1>
<p class="sub">starful.biz · hatena · jpcampus 스크립트 실행 (백그라운드)</p>
<div id="jobs"></div>
<div class="card" style="margin-top:16px">
    <h3 style="margin-top:0">로그</h3>
    <pre class="mono" id="log" style="white-space:pre-wrap;max-height:400px;overflow:auto;color:#aaa">—</pre>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentSite = '', currentJob = '';

async function loadJobs() {
    const res = await fetch('/api/content/jobs');
    const sites = await res.json();
    const el = document.getElementById('jobs');
    el.innerHTML = sites.map(s => `
        <div class="card">
            <h3 style="margin-top:0">${s.label} <span class="mono" style="color:#666">${s.site_id}</span></h3>
            ${!s.available ? '<p class="warn">WORK_ROOT 없음 — 로컬 Mac에서만 실행</p>' : ''}
            ${s.jobs.map(j => `
                <button class="btn btn-ghost" style="margin:4px 4px 4px 0" ${s.available?'':'disabled'}
                    onclick="runJob('${s.site_id}','${j.id}')">${j.label}</button>
            `).join('')}
        </div>`).join('');
}

async function runJob(site_id, job_id) {
    currentSite = site_id; currentJob = job_id;
    const res = await fetch('/api/content/run', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ site_id, job_id })
    });
    const d = await res.json();
    if (!res.ok) return showToast(d.error || '실패');
    showToast('시작됨 pid ' + d.pid);
    pollLog();
}

async function pollLog() {
    if (!currentSite) return;
    const res = await fetch(`/api/content/log?site_id=${encodeURIComponent(currentSite)}&job_id=${encodeURIComponent(currentJob)}`);
    const d = await res.json();
    document.getElementById('log').textContent = d.text || '—';
}

setInterval(pollLog, 3000);
loadJobs();
</script>
{% endblock %}
