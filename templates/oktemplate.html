{% extends "base.html" %}
{% block title %}새 OK 사이트{% endblock %}
{% block content %}
<h1>새 OK 사이트</h1>
<p class="sub">oktemplate 복사 → quickstart.py → sites.yaml 등록</p>
{% if not work_root_ok %}
<div class="warn">WORK_ROOT(/opt/work)가 필요합니다. 로컬에서 실행하세요.</div>
{% endif %}
<div class="card" style="max-width:480px">
    <div class="form-row"><label>site_id (소문자, 예: okbakery)</label>
        <input id="site-id" placeholder="okbakery" {% if not work_root_ok %}disabled{% endif %}>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:12px">
        <input type="checkbox" id="force-copy" style="width:auto"> 기존 폴더 덮어쓰기
    </label>
    <button class="btn" onclick="createSite()" {% if not work_root_ok %}disabled{% endif %}>생성</button>
</div>
<div id="result" class="card" style="display:none;margin-top:16px">
    <h3 style="margin-top:0">체크리스트</h3>
    <ul id="checklist" class="mono" style="color:#aaa;line-height:1.8"></ul>
</div>
{% endblock %}
{% block scripts %}
<script>
async function createSite() {
    const site_id = document.getElementById('site-id').value.trim();
    const force = document.getElementById('force-copy').checked;
    const res = await fetch('/api/oktemplate/create', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ site_id, force }),
    });
    const d = await res.json();
    if (!d.ok) { showToast(d.error || 'failed'); return; }
    showToast('생성됨: ' + d.site_id);
    const box = document.getElementById('result');
    box.style.display = 'block';
    document.getElementById('checklist').innerHTML = (d.checklist || []).map(c => '<li>'+c+'</li>').join('');
}
</script>
{% endblock %}
