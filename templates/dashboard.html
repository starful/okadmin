{% extends "base.html" %}
{% block title %}홈{% endblock %}
{% block head %}
<style>
</style>
{% endblock %}
{% block content %}
<h1>홈</h1>
<p class="sub">지금 할 일 판단 — 긴급순 정렬</p>
{% if not work_root_ok %}
<div class="warn">WORK_ROOT 없음 — 콘텐츠·Git 비활성</div>
{% endif %}
<div class="dash-toolbar-home">
    <button type="button" class="btn btn-ghost btn-sm" id="btn-refresh-backlog" onclick="refreshAllBacklog()">백로그 새로고침</button>
    <p class="hint">백로그·due·Git·마지막 실행을 보고 지금/대기/스킵을 표시합니다</p>
</div>
<div id="loading" class="mono" style="font-size:12px;color:#666;margin-bottom:12px">로딩 중…</div>
<div id="sites-grid" class="grid-sites-slim"></div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='pipeline.js') }}"></script>
<script>
const DASH_ORDER_KEY = 'okadmin_dashboard_site_order_v1';
const DUE_WEIGHT = { overdue: 40, never: 35, today: 28, soon: 12, ok: 0 };

function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}

function dueClass(schedule) {
    const st = (schedule && schedule.status) || 'never';
    return ['ok', 'soon', 'today', 'overdue', 'never'].includes(st) ? st : 'never';
}

function dueWeight(schedule) {
    return DUE_WEIGHT[dueClass(schedule)] || 0;
}

function backlogSnap(pipe) {
    return (pipe && pipe.backlog) || null;
}

function backlogCounts(pipe, siteId) {
    const snap = backlogSnap(pipe);
    const bl = (snap && snap.backlog) || {};
    const sid = siteId || (pipe && pipe.site_id) || '';
    const itemLabel = sid === 'okstats' ? '인사이트' : '아이템';
    const total =
        (bl.items_pairs || 0) + (bl.guides_topics || 0) + (bl.guides_md || 0) +
        (bl.korean_files || 0) + (bl.images || 0);
    const summary = (snap && snap.summary) || '';
    const next = snap && snap.next_run;
    const nextLine = typeof nextRunText === 'function'
        ? nextRunText(snap)
        : (next && ((next.items_pairs || 0) + (next.guides_topics || 0) + (next.korean_files || 0)) > 0
            ? `다음 실행 약 ${(next.items_pairs || 0) + (next.guides_topics || 0) + (next.korean_files || 0)}건`
            : '');
    const nextTotal = next
        ? (next.items_pairs || 0) + (next.guides_topics || 0) + (next.korean_files || 0)
        : 0;
    const parts = [];
    if (summary && summary !== '없음') parts.push(summary);
    else {
        if (bl.items_pairs) parts.push(`${itemLabel} ${bl.items_pairs}`);
        if (bl.guides_topics) parts.push(`가이드 ${bl.guides_topics}`);
        if (bl.guides_md) parts.push(`MD ${bl.guides_md}`);
        if (bl.korean_files) parts.push(`${sid === 'krcampus' ? '일본어' : '번역'} ${bl.korean_files}`);
        if (bl.images) parts.push(`이미지 ${bl.images}`);
    }
    const csvExpand = snap && snap.csv_expand;
    const csvSuggested = !!(csvExpand && csvExpand.suggested);
    return {
        total,
        text: parts.length ? parts.join(' · ') : '없음',
        nextTotal,
        nextText: nextLine,
        csvSuggested,
        csvExpandable: csvExpand
            ? (csvExpand.items_expandable || 0) + (csvExpand.guides_expandable || 0)
            : 0,
        stale: !snap,
    };
}

function assessSite(site, logs, pipe) {
    const bl = backlogCounts(pipe, site.id);
    const git = site.git_summary || {};
    const contentDue = logs.content_schedule || {};
    const gscDue = logs.gsc_schedule || {};
    const cStat = dueClass(contentDue);
    const gStat = dueClass(gscDue);
    const reasons = [];
    let priority = 0;
    let verdict = 'wait';
    let action = '상세 확인';

    if (pipe && pipe.running) {
        verdict = 'running';
        priority = 90;
        action = pipe.phase === 'deploy' ? '배포 완료 대기' : '생성·빌드 대기';
        reasons.push('파이프라인 실행 중');
        if (bl.text !== '없음') reasons.push(`백로그: ${bl.text}`);
        return { verdict, priority, action, reasons, bl, git, cStat, gStat };
    }

    priority += dueWeight(gscDue) + dueWeight(contentDue);

    if (logs.last_content_added_ok === false) {
        priority += 22;
        reasons.push(`마지막 콘텐츠 생성 실패 (${logs.last_content_added_at || '?'})`);
    }
    if (logs.last_gsc_response_ok === false) {
        priority += 22;
        reasons.push(`마지막 SEO 실패 (${logs.last_gsc_response_at || '?'})`);
    }
    const dep = (logs.deploy || [])[0];
    if (dep && dep.state === 'failed') {
        priority += 18;
        reasons.push(`배포 실패 (${dep.mtime})`);
    }

    if (bl.stale && pipe) {
        reasons.push('백로그 미갱신 — 「백로그 새로고침」 권장');
    } else if (bl.total > 0) {
        reasons.push(`백로그 ${bl.total}건: ${bl.text}`);
        if (bl.nextText) reasons.push(bl.nextText);
    } else {
        reasons.push('백로그 없음');
    }

    if (bl.csvSuggested) {
        priority += 8;
        reasons.push(`CSV 확장 가능 ${bl.csvExpandable}건 — 토픽 추가 검토`);
    }

    if (git.dirty) {
        priority += 14;
        reasons.push(`Git dirty (${git.branch || 'main'}) — Push 필요`);
    } else if (git.branch) {
        reasons.push(`Git clean · ${git.branch}`);
    }

    reasons.push(`콘텐츠 주기: ${logs.content_due_label || '—'}`);
    reasons.push(`GSC 주기: ${logs.gsc_due_label || '—'}`);

    const contentUrgent = ['overdue', 'today', 'never'].includes(cStat);
    const gscUrgent = ['overdue', 'today', 'never'].includes(gStat);
    const contentSoon = cStat === 'soon';
    const gscSoon = gStat === 'soon';

    if (gStat === 'overdue' || (gStat === 'never' && !logs.last_gsc_response_at)) {
        action = 'SEO 작업 권장';
        priority += 5;
    } else if (contentUrgent && bl.total > 0) {
        action = '콘텐츠 생성 권장';
    } else if (bl.total > 0 && (contentUrgent || contentSoon)) {
        action = '콘텐츠 생성 검토';
    } else if (git.dirty && logs.last_content_added_ok === true) {
        action = 'Git Push 권장';
    } else if (gscUrgent || gscSoon) {
        action = 'GSC·SEO 확인';
    } else if (bl.csvSuggested) {
        action = 'CSV 추가 후 생성 검토';
    } else if (bl.total === 0 && cStat === 'ok' && gStat === 'ok' && !git.dirty) {
        action = '지금은 패스 가능';
        verdict = 'skip';
        priority = Math.min(priority, 5);
    } else if (cStat === 'ok' && gStat === 'ok') {
        action = '급하지 않음 — 여유 있을 때';
        verdict = 'wait';
    }

    if (verdict !== 'skip' && verdict !== 'running') {
        if (priority >= 45 || gStat === 'overdue' || cStat === 'overdue') {
            verdict = 'now';
        } else if (priority >= 20 || contentUrgent || gscUrgent || contentSoon || gscSoon) {
            verdict = 'today';
        } else {
            verdict = 'wait';
        }
    }

    if (verdict === 'now' && action === '지금은 패스 가능') {
        action = '즉시 대응 필요';
    }

    return { verdict, priority, action, reasons, bl, git, cStat, gStat };
}

function verdictBanner(assessment) {
    const labels = {
        now: '지금',
        today: '오늘',
        wait: '대기',
        skip: '스킵',
        running: '진행 중',
    };
    const label = labels[assessment.verdict] || '—';
    let headline = assessment.action;
    if (assessment.verdict === 'now') {
        const urg = [];
        if (['overdue', 'never', 'today'].includes(assessment.gStat)) urg.push('GSC');
        if (['overdue', 'never', 'today'].includes(assessment.cStat)) urg.push('콘텐츠');
        if (assessment.git.dirty) urg.push('Push');
        if (urg.length) headline = urg.join(' · ') + ' — ' + assessment.action;
    }
    return `<div class="card-verdict verdict-${escapeHtml(assessment.verdict)}">
        <strong>${escapeHtml(label)}</strong>${escapeHtml(headline)}
    </div>`;
}

function contentDetail(site, logs, pipe, assessment) {
    if (pipe && pipe.running && pipe.phase !== 'deploy') {
        return { mid: '생성·빌드 중…', due: 'run', dueText: '진행 중' };
    }
    const bl = assessment.bl;
    let mid = bl.text;
    if (bl.nextText && bl.total > 0) mid += ` · ${bl.nextText}`;
    if (bl.csvSuggested) mid += ' · CSV 확장 가능';
    const dueText = logs.content_due_label || '—';
    return { mid, due: dueClass(logs.content_schedule), dueText };
}

function deployDetail(site, logs, pipe, assessment) {
    if (pipe && pipe.running && pipe.phase === 'deploy') {
        return { mid: '배포 중…', due: 'run', dueText: '진행 중' };
    }
    const git = assessment.git;
    let mid = git.dirty ? `dirty · ${git.branch || 'main'}` : (git.branch ? `clean · ${git.branch}` : 'Git 없음');
    const dep = (logs.deploy || [])[0];
    let dueText = '—';
    if (dep) {
        dueText = `${dep.mtime} ${dep.state === 'success' ? '성공' : dep.state === 'failed' ? '실패' : dep.state}`;
    } else if (logs.last_content_added_at) {
        dueText = logs.last_content_added_at + (logs.last_content_added_ok === false ? ' 실패' : logs.last_content_added_ok === true ? ' 성공' : '');
    }
    if (git.dirty && assessment.verdict !== 'running') {
        mid += ' · Push 대기';
    }
    return { mid, due: git.dirty ? 'today' : dueClass(logs.content_schedule), dueText };
}

function seoDetail(logs, assessment) {
    let mid = logs.last_gsc_response_at ? `마지막 ${logs.last_gsc_response_at}` : '미실행';
    if (logs.last_gsc_response_ok === false) mid += ' · 실패';
    else if (logs.last_gsc_response_ok === true) mid += ' · 성공';
    return { mid, due: dueClass(logs.gsc_schedule), dueText: logs.gsc_due_label || '—' };
}

function wfRow(tag, detail) {
    return `<div class="wf-row">
        <span class="wf-tag">${escapeHtml(tag)}</span>
        <span class="wf-detail" title="${escapeHtml(detail.mid)}">${escapeHtml(detail.mid)}</span>
        <span class="wf-due ${escapeHtml(detail.due)}">${escapeHtml(detail.dueText)}</span>
    </div>`;
}

function workflowRowsHtml(site, logs, pipe, assessment) {
    return `<div class="wf-rows">
        ${wfRow('콘텐츠', contentDetail(site, logs, pipe, assessment))}
        ${wfRow('배포', deployDetail(site, logs, pipe, assessment))}
        ${wfRow('SEO', seoDetail(logs, assessment))}
    </div>`;
}

function reasonsHtml(assessment) {
    const top = assessment.reasons.slice(0, 4);
    if (!top.length) return '';
    return `<ul class="verdict-reasons">${top.map(r => `<li>${escapeHtml(r)}</li>`).join('')}</ul>`;
}

function renderSitesGrid(sites, logData, pipelines) {
    const pipeMap = {};
    (pipelines || []).forEach(p => { pipeMap[p.site_id] = p; });

    const rows = sites
        .filter(s => s.id !== 'okadmin')
        .map(s => {
            const logs = (logData.sites || {})[s.id] || {};
            const pipe = pipeMap[s.id];
            const assessment = assessSite(s, logs, pipe);
            return { site: s, logs, pipe, assessment };
        })
        .sort((a, b) => b.assessment.priority - a.assessment.priority);

    const grid = document.getElementById('sites-grid');
    grid.innerHTML = rows.map(({ site: s, logs, pipe, assessment }) => {
        const runningCls = pipe && pipe.running ? ' pipe-running' : '';
        const verdictCls = ` verdict-${assessment.verdict}`;
        const href = '/site/' + encodeURIComponent(s.id);
        const sectionHint = assessment.verdict === 'now' || assessment.gStat === 'overdue' || assessment.gStat === 'today'
            ? '?section=seo'
            : (assessment.bl.total > 0 ? '?section=content' : (assessment.git?.dirty ? '?section=deploy' : ''));
        return `<a href="${href}${sectionHint}" class="card dash-card slim${runningCls}${verdictCls}" data-site-id="${escapeHtml(s.id)}">
            <div class="slim-head">
                <span class="slim-title">${escapeHtml(s.label || s.id)}</span>
            </div>
            <div class="slim-id">${escapeHtml(s.id)}</div>
            ${verdictBanner(assessment)}
            ${reasonsHtml(assessment)}
            ${workflowRowsHtml(s, logs, pipe, assessment)}
            <div class="slim-foot">
                <span class="verdict-action">→ ${escapeHtml(assessment.action)}</span>
                <span class="btn btn-open">열기</span>
            </div>
        </a>`;
    }).join('');
}

async function refreshAllBacklog() {
    const btn = document.getElementById('btn-refresh-backlog');
    if (btn) btn.disabled = true;
    if (typeof refreshBacklog === 'function') {
        await refreshBacklog(null, { silent: false });
        await loadHome();
    }
    if (btn) btn.disabled = false;
}

async function loadHome() {
    const loading = document.getElementById('loading');
    try {
        if (typeof refreshBacklog === 'function') {
            await refreshBacklog(null, { silent: true });
        }
        const [sitesRes, logsRes, pipesRes] = await Promise.all([
            fetch('/api/sites'),
            fetch('/api/dashboard/logs'),
            fetch('/api/content/pipelines'),
        ]);
        const sites = await sitesRes.json();
        let logData = { global: {}, sites: {} };
        let pipelines = [];
        try { logData = await logsRes.json(); } catch (_) {}
        try { pipelines = await pipesRes.json(); } catch (_) {}
        loading.style.display = 'none';
        renderSitesGrid(sites, logData, pipelines);
    } catch (_) {
        loading.textContent = '로드 실패';
    }
}

loadHome();
</script>
{% endblock %}
