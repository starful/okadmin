{% extends "base.html" %}
{% block title %}GCS 이미지{% endblock %}
{% block head %}
<style>
    .search-bar { background: var(--surf); border: 1px solid var(--border); padding: 10px 20px; border-radius: 30px; color: #fff; width: 300px; margin-bottom: 24px; }
    .date-group { margin-bottom: 40px; }
    .date-header { font-size: 20px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .date-header span { font-size: 11px; color: var(--accent); font-family: 'DM Mono'; }
    .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .img-card { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; }
    .img-card:hover { border-color: var(--accent); }
    .img-card img { width: 100%; height: 100px; object-fit: cover; }
    .img-card .card-body { padding: 8px; font-family: 'DM Mono'; font-size: 10px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surf); padding: 24px; border-radius: 16px; width: 800px; max-height: 85vh; overflow-y: auto; position: relative; }
    .close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
    .photo-strip { display: flex; gap: 8px; overflow-x: auto; }
    .photo-strip img { height: 72px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
    .photo-strip img.selected { border-color: var(--accent); }
    .prompt-box { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-family: 'DM Mono'; font-size: 12px; color: #aaa; position: relative; }
    .site-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .site-tabs button { padding: 8px 12px; background: var(--surf); border: 1px solid var(--border); color: #888; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 11px; }
    .site-tabs button.active { background: var(--accent); color: #000; border-color: var(--accent); }
</style>
{% endblock %}
{% block content %}
<h1>GCS 이미지</h1>
<p class="sub">Places · 업로드 (기존 OK Admin)</p>
<div class="site-tabs" id="site-tabs"></div>
<input type="text" class="search-bar" placeholder="이미지 검색..." oninput="filterGrid(this.value)">
<div id="grid-container"></div>
<div class="modal-overlay" id="modal">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">×</button>
        <h2 id="modal-title"></h2>
        <div id="prompt-area" style="display:none">
            <div style="font-size:11px;color:var(--accent);margin-bottom:6px">AI PROMPT</div>
            <div class="prompt-box"><button class="btn" style="position:absolute;top:8px;right:8px;padding:4px 8px;font-size:10px" onclick="copyPrompt()">COPY</button><span id="prompt-text"></span></div>
        </div>
        <img id="modal-img" style="width:100%;height:260px;object-fit:cover;border-radius:8px;margin:12px 0">
        <div id="places-area"><p class="mono">Places:</p><div id="places-list"></div>
        <button onclick="applyReplace()" id="btn-replace" class="btn" style="margin-top:12px" disabled>이미지 교체</button></div>
        <hr style="border:0;border-top:1px solid var(--border);margin:20px 0">
        <p class="mono">직접 업로드:</p>
        <input type="file" id="file-input" onchange="uploadImg()">
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentSite = '', allData = [], selectedPhoto = '', currentSlug = '';
const sitesCfg = {{ sites | tojson }};
const siteIds = Object.keys(sitesCfg);
const tabs = document.getElementById('site-tabs');
siteIds.forEach((sid) => {
    const b = document.createElement('button');
    b.innerText = sitesCfg[sid].label;
    b.id = 'tab-' + sid;
    b.onclick = () => selectSite(sid);
    tabs.appendChild(b);
});
const defaultSite = {{ default_image_site | tojson }};
const savedSite = localStorage.getItem('okadmin_image_site');
const initialSite = (savedSite && sitesCfg[savedSite]) ? savedSite
    : ((defaultSite && sitesCfg[defaultSite]) ? defaultSite : (siteIds[0] || null));
if (initialSite) selectSite(initialSite);
else document.getElementById('grid-container').innerHTML = '<p class="mono">GCS 사이트 없음</p>';

async function selectSite(sid) {
    currentSite = sid;
    try { localStorage.setItem('okadmin_image_site', sid); } catch (_) {}
    document.querySelectorAll('.site-tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + sid).classList.add('active');
    const res = await fetch('/api/images/' + sid);
    allData = await res.json();
    renderGrid(allData);
}
function renderGrid(data) {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';
    let lastDate = '', currentGroup = null;
    data.forEach(img => {
        if (img.date_str !== lastDate) {
            lastDate = img.date_str;
            const groupDiv = document.createElement('div');
            groupDiv.className = 'date-group';
            groupDiv.innerHTML = `<div class="date-header">${lastDate} <span>${data.filter(d => d.date_str === lastDate).length} ITEMS</span></div><div class="img-grid"></div>`;
            container.appendChild(groupDiv);
            currentGroup = groupDiv.querySelector('.img-grid');
        }
        const card = document.createElement('div');
        card.className = 'img-card';
        card.onclick = () => openModal(img);
        card.innerHTML = `<img src="${img.url}?t=${Date.now()}" loading="lazy"><div class="card-body">${img.slug}<br>${img.size_kb} KB</div>`;
        currentGroup.appendChild(card);
    });
}
function filterGrid(q) {
    renderGrid(allData.filter(d => d.slug.toLowerCase().includes(q.toLowerCase())));
}
async function openModal(img) {
    currentSlug = img.slug; selectedPhoto = '';
    document.getElementById('modal-title').innerText = img.slug;
    document.getElementById('modal-img').src = img.url;
    const promptArea = document.getElementById('prompt-area');
    if (sitesCfg[currentSite].prompt_template) {
        document.getElementById('prompt-text').innerText = sitesCfg[currentSite].prompt_template.replace('[{slug}]', `[${img.slug}]`);
        promptArea.style.display = 'block';
    } else promptArea.style.display = 'none';
    document.getElementById('modal').classList.add('open');
    const pList = document.getElementById('places-list');
    pList.innerHTML = '검색 중...';
    const res = await fetch(`/api/search/${currentSite}/${img.slug}`);
    const places = await res.json();
    pList.innerHTML = places.map(p => `<div style="margin-bottom:12px"><div class="mono">${p.name}</div><div class="photo-strip">${p.photos.map(ph => `<img src="https://places.googleapis.com/v1/${ph}/media?maxWidthPx=200&key={{ places_key }}" onclick="selectPhoto(this, '${ph}')">`).join('')}</div></div>`).join('');
}
function copyPrompt() {
    navigator.clipboard.writeText(document.getElementById('prompt-text').innerText).then(() => showToast('복사됨'));
}
function selectPhoto(el, ph) {
    document.querySelectorAll('.photo-strip img').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
    selectedPhoto = ph;
    document.getElementById('btn-replace').disabled = false;
}
async function applyReplace() {
    const res = await fetch('/api/replace/places', { method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ site_id: currentSite, slug: currentSlug, photo_name: selectedPhoto }) });
    if ((await res.json()).ok) { showToast('교체 완료'); closeModal(); selectSite(currentSite); }
}
async function uploadImg() {
    const file = document.getElementById('file-input').files[0];
    const fd = new FormData();
    fd.append('file', file); fd.append('site_id', currentSite); fd.append('slug', currentSlug);
    const res = await fetch('/api/replace/upload', { method: 'POST', body: fd });
    if ((await res.json()).ok) { showToast('업로드 완료'); closeModal(); selectSite(currentSite); }
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
</script>
{% endblock %}
