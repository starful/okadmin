<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="dark">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Embed{% endblock %}</title>
    <style>
        :root { --bg: #0a0a0a; --surf: #121212; --border: #222; --accent: #e8ff47; --text: #eee; --muted: #777; }
        html, body { background: #0a0a0a; color: #eee; margin: 0; overflow-x: hidden; overflow-y: visible; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px 20px; }
        .btn { padding: 9px 16px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .card { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .mono { font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
        input, select, textarea { background: #000; border: 1px solid var(--border); color: #fff; padding: 9px 12px; border-radius: 8px; font-size: 13px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <div id="toast" style="position:fixed;bottom:16px;right:16px;background:var(--accent);color:#000;padding:10px 18px;border-radius:8px;font-weight:700;display:none;z-index:999"></div>
    <script>
        function showToast(m) {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }
        function escapeHtmlOps(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
        }

        function renderOpsStatus(el, state, title, detail, logTail) {
            if (!el) return;
            const colors = {
                success: '#6a6', running: '#fa0', failed: '#f88', unknown: '#888',
            };
            const c = colors[state] || '#888';
            let html = `<div style="color:${c};font-weight:700;margin-bottom:4px">${escapeHtmlOps(title)}</div>`;
            if (detail) html += `<div style="color:#aaa;white-space:pre-wrap;word-break:break-word">${escapeHtmlOps(detail)}</div>`;
            if (logTail) {
                html += `<pre style="margin-top:8px;max-height:160px;overflow:auto;background:#000;border:1px solid #333;padding:8px;color:#8a8;font-size:10px">${escapeHtmlOps(logTail)}</pre>`;
            }
            el.style.display = 'block';
            el.innerHTML = html;
            if (typeof okadminEmbedResize === 'function') setTimeout(okadminEmbedResize, 80);
        }

        async function pollDeployStatus(siteId, jobId, statusEl, onDone) {
            const maxMs = 45 * 60 * 1000;
            const started = Date.now();
            while (Date.now() - started < maxMs) {
                await new Promise(r => setTimeout(r, 3000));
                const res = await fetch(
                    `/api/sites/${encodeURIComponent(siteId)}/deploy/status?job_id=${encodeURIComponent(jobId)}`,
                    { credentials: 'same-origin' }
                );
                const d = await res.json();
                if (!res.ok || d.error) {
                    renderOpsStatus(statusEl, 'failed', '상태 조회 실패', d.error || '', '');
                    if (onDone) onDone(false, d);
                    return;
                }
                renderOpsStatus(statusEl, d.state, d.message || d.state, d.log_path || '', d.log_tail || '');
                if (d.state === 'success') {
                    showToast('배포 완료');
                    if (onDone) onDone(true, d);
                    return;
                }
                if (d.state === 'failed') {
                    showToast('배포 실패');
                    if (onDone) onDone(false, d);
                    return;
                }
                if (d.state === 'unknown') {
                    if (onDone) onDone(null, d);
                    return;
                }
            }
            renderOpsStatus(statusEl, 'failed', '타임아웃', '45분 내 완료 신호 없음', '');
            showToast('배포 타임아웃 · 로그 확인');
            if (onDone) onDone(false, null);
        }

        function okadminEmbedResize() {
            if (window.parent === window) return;
            const h = Math.max(
                document.body.scrollHeight,
                document.documentElement.scrollHeight,
                document.body.offsetHeight
            );
            window.parent.postMessage({ type: 'okadmin-embed-resize', height: h }, '*');
        }
        window.addEventListener('load', () => setTimeout(okadminEmbedResize, 80));
        if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(() => okadminEmbedResize()).observe(document.body);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
